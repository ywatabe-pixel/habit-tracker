<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>習慣トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EB;
    --surface: #FDFBF7;
    --border: #E2DDD4;
    --text: #1C1A16;
    --muted: #8C8880;
    --accent: #2D5A27;
    --accent-light: #EAF3DE;
    --accent-mid: #639922;
    --danger: #993C1D;
    --danger-light: #FAECE7;
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 6px;
  }

  .container { max-width: 520px; margin: 0 auto; }

  .add-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .add-box input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .add-box input:focus { border-color: var(--accent-mid); }
  .add-box input::placeholder { color: var(--muted); }

  .add-box button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .add-box button:hover { opacity: 0.88; }
  .add-box button:active { transform: scale(0.97); }

  .date-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .habits-list { display: flex; flex-direction: column; gap: 10px; }

  .habit-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
    user-select: none;
  }

  .habit-item:hover { border-color: #C8C4BA; }

  .habit-item.done {
    border-color: var(--accent-mid);
    background: var(--accent-light);
  }

  .check-circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: var(--bg);
  }

  .habit-item.done .check-circle {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-circle svg { display: none; }
  .habit-item.done .check-circle svg { display: block; }

  .habit-name {
    flex: 1;
    font-size: 15px;
    font-weight: 400;
    transition: color 0.2s;
  }

  .habit-item.done .habit-name {
    color: var(--accent);
    font-weight: 500;
  }

  .streak {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .habit-item.done .streak { color: var(--accent-mid); }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 18px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .delete-btn:hover { color: var(--danger); }

  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-top: 1.5rem;
    display: flex;
    justify-content: space-around;
    text-align: center;
  }

  .summary-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--accent);
  }

  .summary-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 2rem 0;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .habit-item { animation: popIn 0.2s ease; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>習慣トラッカー</h1>
    <p id="today-str"></p>
  </header>

  <div class="add-box">
    <input type="text" id="new-habit" placeholder="新しい習慣を入力（例：水を2L飲む）" maxlength="40" />
    <button onclick="addHabit()">追加</button>
  </div>

  <div class="date-label" id="date-label"></div>
  <div class="habits-list" id="habits-list"></div>

  <div class="summary" id="summary" style="display:none">
    <div>
      <div class="summary-num" id="done-count">0</div>
      <div class="summary-label">完了</div>
    </div>
    <div>
      <div class="summary-num" id="total-count">0</div>
      <div class="summary-label">合計</div>
    </div>
    <div>
      <div class="summary-num" id="pct">0%</div>
      <div class="summary-label">達成率</div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'habit-tracker-v1';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { habits: [], logs: {} }; }
  catch { return { habits: [], logs: {} }; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getStreak(data, habitId) {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const done = (data.logs[key] || []).includes(habitId);
    if (!done) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function render() {
  const data = loadData();
  const today = todayKey();
  const doneTodaySet = new Set(data.logs[today] || []);
  const list = document.getElementById('habits-list');

  const d = new Date();
  const days = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
  document.getElementById('today-str').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${days[d.getDay()]}`;
  document.getElementById('date-label').textContent = '今日の習慣';

  if (data.habits.length === 0) {
    list.innerHTML = '<div class="empty">習慣をまだ登録していません。<br>上の欄から追加してみましょう！</div>';
    document.getElementById('summary').style.display = 'none';
    return;
  }

  list.innerHTML = '';
  data.habits.forEach(h => {
    const done = doneTodaySet.has(h.id);
    const streak = getStreak(data, h.id);
    const item = document.createElement('div');
    item.className = 'habit-item' + (done ? ' done' : '');
    item.innerHTML = `
      <div class="check-circle">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="habit-name">${h.name}</span>
      <span class="streak">${streak > 0 ? '🔥 ' + streak + '日' : ''}</span>
      <button class="delete-btn" title="削除">×</button>
    `;
    item.querySelector('.check-circle').addEventListener('click', () => toggleHabit(h.id));
    item.querySelector('.habit-name').addEventListener('click', () => toggleHabit(h.id));
    item.querySelector('.delete-btn').addEventListener('click', e => { e.stopPropagation(); deleteHabit(h.id); });
    list.appendChild(item);
  });

  const total = data.habits.length;
  const done = doneTodaySet.size;
  document.getElementById('done-count').textContent = done;
  document.getElementById('total-count').textContent = total;
  document.getElementById('pct').textContent = total ? Math.round(done/total*100) + '%' : '0%';
  document.getElementById('summary').style.display = 'flex';
}

function addHabit() {
  const input = document.getElementById('new-habit');
  const name = input.value.trim();
  if (!name) return;
  const data = loadData();
  data.habits.push({ id: Date.now().toString(), name });
  saveData(data);
  input.value = '';
  render();
}

function toggleHabit(id) {
  const data = loadData();
  const today = todayKey();
  if (!data.logs[today]) data.logs[today] = [];
  const idx = data.logs[today].indexOf(id);
  if (idx === -1) data.logs[today].push(id);
  else data.logs[today].splice(idx, 1);
  saveData(data);
  render();
}

function deleteHabit(id) {
  if (!confirm('この習慣を削除しますか？')) return;
  const data = loadData();
  data.habits = data.habits.filter(h => h.id !== id);
  saveData(data);
  render();
}

document.getElementById('new-habit').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHabit();
});

render();
</script>
</body>
</html>
